cdeps:
  execution:
    executable: /usr/bin/date
    batchargs:
      nodes: 1
      stdout: /work2/noaa/nems/tufuk/COASTAL/ufs-coastal-app/sorc/uwtools/runscript.out
      walltime: "00:05:00"
  atm_in:
    update_values:
      datm_nml:
        datamode: ATMMESH
        factorfn_data: "null"
        factorfn_mesh: "null"
        flds_co2: false
        flds_presaero: false
        flds_wiso: false
        iradsw: 1
        model_maskfile: "INPUT/irene_roms_grid_rho_ESMFmesh.nc"
        model_meshfile: "INPUT/irene_roms_grid_rho_ESMFmesh.nc"
        nx_global: 242
        ny_global: 106
        restfilm: "null"
        export_all: true
  atm_streams:
    base_file: stream.jinja2 
    streams:
      stream01:
        taxmode: limit 
        mapalgo: redist
        tinterpalgo: linear
        readmode: single
        dtlimit: 1.5
        stream_offset: 0
        yearFirst: 2008
        yearLast: 2008
        yearAlign: 2008
        stream_vectors: ['u', 'v']
        stream_mesh_file: mesh.nc
        stream_lev_dimname: "null"
        stream_data_files: a.nc
        stream_data_variables: var1
      stream02:
        taxmode: limit
        mapalgo: redist
        tinterpalgo: linear
        readmode: single
        dtlimit: 1.5
        stream_offset: 0
        yearFirst: 2008
        yearLast: 2008
        yearAlign: 2008
        stream_vectors: "null" 
        stream_mesh_file: mesh.nc
        stream_lev_dimname: "null"
        stream_data_files: ['b.nc', 'c.nc']
        stream_data_variables: ['var2', 'var3']
  run_dir: /work2/noaa/nems/tufuk/COASTAL/ufs-coastal-app/sorc/uwtools
